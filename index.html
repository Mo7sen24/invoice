<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فاتورة</title>

<link rel="stylesheet" href="style.css">

<!-- PDF Libraries -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>
  <div class="header">
  <img src="logo.png" class="logo"> <!-- ضع مسار الصورة هنا -->
</div>

<div class="invoice" id="invoice">
<div class="header">
  <div class="brand-logo">
    <span class="brand-name">Kimaten كيماتن</span>
  </div>
  <h2>فاتورة</h2>
</div>

  <div class="info">
    <div>
      <label>اسم العميل:</label>
      <input type="text" id="customerName">
      <span id="customerNameText" class="pdf-only"></span>
    </div>
    <div>
      <label>التاريخ:</label>
      <input type="date" id="date">
      <span id="dateText" class="pdf-only"></span>
    </div>
  </div>

  <table id="invoiceTable">
    <thead>
      <tr>
        <th>م</th>
        <th>البيان</th>
        <th>الكمية</th>
        <th>السعر</th>
        <th>الإجمالي</th>
        <th>حذف</th>
      </tr>
    </thead>

    <tbody id="tableBody"></tbody>

  </table>

  <div class="total">
    الإجمالي الكلي: <span id="grandTotal">0</span>
  </div>

</div>

<div class="buttons">
  <button onclick="addRow()">Add Row</button>
  <button onclick="downloadPDF()">تحميل PDF</button>
  <button onclick="window.print()">طباعة</button>
</div>

<script src="script.js"></script>

</body>
</html>
